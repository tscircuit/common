name: tscircuit Snapshot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install
      - run: bunx tsci snapshot
